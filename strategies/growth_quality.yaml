# Growth Quality Strategy / 成长质量

name: growth_quality
display_name: 成长质量
description: 结合收入利润增长、ROE、经营现金流、估值承受力和行业空间，识别高质量成长股与成长失速风险。
category: framework
core_rules: [2, 3, 5]
required_tools:
  - get_stock_info
  - get_realtime_quote
  - analyze_trend
  - search_stock_news
aliases: [成长, 成长股, 成长质量, 长线成长]
default_priority: 20
market_regimes: [trending_up, long_term]
default_active: true
default_router: true

instructions: |
  **成长质量策略（Growth Quality Strategy）**

  适用场景：
  - 关注公司中长期成长能力，而不是只看短线技术形态。
  - 适合高景气行业、业绩持续改善、商业模式扩张或预期重估阶段的公司。

  数据优先级（必须遵守）：
  1. 必须优先调用 `get_stock_info` 获取结构化基本面数据。
  2. `get_stock_info.financial_report` 是成长质量判断的主数据源，重点读取：
     - report_date
     - revenue
     - net_profit_parent
     - operating_cash_flow
     - roe
     - currency
  3. 如果顶层 `financial_report` 为空，再查看：
     `fundamental_context.earnings.data.financial_report`。
  4. `search_stock_news` 只用于补充近期公告、监管、减持、业绩预告、行业催化和舆情风险。
     不允许把新闻搜索结果当成结构化财报数据。
  5. 如果结构化财报字段缺失，必须明确说明：
     “结构化财报字段缺失，本次成长质量判断降级”，不得仅凭新闻给出高置信度长线结论。

  分析框架：
  1. **成长性**
     - 判断营业收入和归母净利润是否同向改善。
     - 识别“增收不增利”、利润一次性增长、收入放缓等风险。
     - 若只有概念热度但财报尚未验证，应降低成长确定性。

  2. **盈利质量**
     - ROE 越高且越稳定，质量越好。
     - 经营现金流与净利润方向一致，说明盈利质量更可靠。
     - 经营现金流显著弱于净利润时，要提示回款、存货或应收风险。

  3. **估值承受力**
     - 使用 PE/PB、市值等估值字段判断市场是否已经提前透支成长。
     - 高成长可以承受更高估值，但必须说明增长能否覆盖估值。
     - 估值高且成长放缓时，应明显下调评分。

  4. **趋势确认**
     - 使用 `analyze_trend` 判断长期成长逻辑是否被市场资金确认。
     - 基本面向好但技术面未确认时，优先给观察条件，不直接追买。

  输出要求：
  - 明确公司处于：高质量成长 / 成长验证中 / 成长放缓 / 成长证伪。
  - 必须列出已读取到的结构化财报字段；如果缺失，要列为核心风险。
  - 说明成长来自收入扩张、利润率改善、行业景气，还是一次性因素。
  - 给出适合成长股的买点：业绩验证后突破、回踩长期均线或估值回落。

  评分调整建议：
  - 收入、利润、经营现金流和 ROE 同向改善：`sentiment_score +15`
  - 行业景气与公司新闻互相验证：额外 `+6`
  - 高估值但成长未验证：`sentiment_score -8`
  - 增收不增利或现金流恶化：`sentiment_score -12`
